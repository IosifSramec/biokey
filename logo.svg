<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 185">

  <!-- Arms -->
  <line x1="100" y1="100" x2="63" y2="63"  stroke="#4a9a4a" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="137" y2="63" stroke="#4a9a4a" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="63" y2="137" stroke="#4a9a4a" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="137" y2="137" stroke="#4a9a4a" stroke-width="5" stroke-linecap="round"/>

  <!-- Propeller rings -->
  <circle cx="63"  cy="63"  r="16" fill="#142a14" stroke="#4a9a4a" stroke-width="2.5"/>
  <circle cx="137" cy="63"  r="16" fill="#142a14" stroke="#4a9a4a" stroke-width="2.5"/>
  <circle cx="63"  cy="137" r="16" fill="#142a14" stroke="#4a9a4a" stroke-width="2.5"/>
  <circle cx="137" cy="137" r="16" fill="#142a14" stroke="#4a9a4a" stroke-width="2.5"/>

  <!-- Propeller blades (diagonal cross, suggesting rotation) -->
  <line x1="52" y1="52" x2="74" y2="74" stroke="#4a9a4a" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="74" y1="52" x2="52" y2="74" stroke="#4a9a4a" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <line x1="126" y1="52" x2="148" y2="74" stroke="#4a9a4a" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="148" y1="52" x2="126" y2="74" stroke="#4a9a4a" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <line x1="52" y1="126" x2="74" y2="148" stroke="#4a9a4a" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="74" y1="126" x2="52" y2="148" stroke="#4a9a4a" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <line x1="126" y1="126" x2="148" y2="148" stroke="#4a9a4a" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="148" y1="126" x2="126" y2="148" stroke="#4a9a4a" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Drone body -->
  <circle cx="100" cy="100" r="26" fill="#142a14" stroke="#4a9a4a" stroke-width="2.5"/>

  <!-- Lock shackle (arc opening upward) -->
  <path d="M 93 101 v -6 a 7 7 0 0 1 14 0 v 6"
        fill="none" stroke="#e8f5e0" stroke-width="3" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="88" y="101" width="24" height="17" rx="3.5" fill="#e8f5e0"/>

  <!-- Keyhole -->
  <circle cx="100" cy="109" r="3" fill="#142a14"/>
  <rect x="98.6" y="109" width="2.8" height="5" fill="#142a14"/>

  <!-- Wordmark -->
  <text x="100" y="168"
        text-anchor="middle"
        font-family="Courier New, monospace"
        font-size="21"
        font-weight="bold"
        fill="#4a9a4a"
        letter-spacing="5">BIOKEY</text>

</svg>
